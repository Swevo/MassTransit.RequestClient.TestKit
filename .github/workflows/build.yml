name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for unresolved merge conflict markers
        run: |
          if grep -rIn --exclude-dir=.git -E '^(<{7}|={7}|>{7})( |$)' .; then
            echo "::error::Unresolved merge conflict markers found (see above)."
            exit 1
          fi
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - run: dotnet build --configuration Release
      - run: dotnet test --configuration Release --no-build
      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet pack src/MassTransit.RequestClient.TestKit/MassTransit.RequestClient.TestKit.csproj --configuration Release --no-build -o ./artifacts
      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
